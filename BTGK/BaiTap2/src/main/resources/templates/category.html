<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quản lý danh mục</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #f4f6f9;
            padding: 40px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            max-width: 600px;
            margin: auto;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 18px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #43a047;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        thead {
            background: #2196F3;
            color: white;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

    </style>
</head>
<body>

<div class="container">
    <h1>📂 Quản lý danh mục</h1>

    <!-- FORM THÊM CATEGORY -->
    <form th:action="@{/categories/save}" method="post">
        <input type="text" name="name" placeholder="Nhập tên danh mục..." required>
        <button type="submit">➕ Thêm danh mục</button>
    </form>

    <!-- DANH SÁCH CATEGORY -->
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Tên danh mục</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="c : ${categories}">
            <td th:text="${c.id}"></td>
            <td th:text="${c.name}"></td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
