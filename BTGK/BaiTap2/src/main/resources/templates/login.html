<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

    <style>

        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Segoe UI, sans-serif;
        }

        body{

        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;

        background:linear-gradient(135deg,#4facfe,#00f2fe);

        }

        /* card */

        .login-container{

        width:360px;

        background:white;

        padding:40px;

        border-radius:15px;

        box-shadow:0 15px 35px rgba(0,0,0,0.2);

        }

        /* title */

        .login-title{

        text-align:center;
        margin-bottom:30px;

        font-weight:700;
        color:#333;

        }

        /* alert */

        .alert{

        background:#ffe6e6;
        color:#d63031;

        padding:10px;
        border-radius:6px;

        margin-bottom:15px;

        text-align:center;

        font-size:14px;

        }

        .success{

        background:#e6ffed;
        color:#2ecc71;

        }

        /* input */

        .input-group{

        position:relative;
        margin-bottom:20px;

        }

        .input-group input{

        width:100%;

        padding:12px 40px;

        border-radius:30px;

        border:1px solid #ddd;

        outline:none;

        font-size:14px;

        }

        .input-group i{

        position:absolute;

        left:12px;

        top:50%;

        transform:translateY(-50%);

        color:#555;

        }

        /* button */

        .login-btn{

        width:100%;

        padding:12px;

        border:none;

        border-radius:30px;

        background:#4facfe;

        color:white;

        font-weight:600;

        cursor:pointer;

        transition:0.3s;

        }

        .login-btn:hover{

        background:#00c6ff;

        }

        /* links */

        .links{

        display:flex;
        justify-content:space-between;

        margin-top:15px;

        font-size:13px;

        }

        .links a{

        text-decoration:none;

        color:#4facfe;

        }

        .links a:hover{

        text-decoration:underline;

        }

    </style>

</head>

<body>

<div class="login-container">

    <h2 class="login-title">Đăng nhập</h2>

    <div class="alert" th:if="${param.error}">
        Sai tài khoản hoặc mật khẩu
    </div>

    <div class="alert success" th:if="${param.logout}">
        Đăng xuất thành công
    </div>

    <form th:action="@{/login}" method="post">

        <div class="input-group">
            <i class='bx bx-user'></i>
            <input type="text"
                   name="username"
                   placeholder="Username"
                   required>
        </div>

        <div class="input-group">
            <i class='bx bx-lock-alt'></i>
            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>
        </div>

        <button type="submit" class="login-btn">
            Login
        </button>

        <div class="links">
            <a href="#">Quên mật khẩu?</a>
            <a href="#">Đăng ký</a>
        </div>

    </form>

</div>

</body>

</html>
