spring.application.name=BaiTap2

spring.datasource.url=jdbc:mysql://localhost:3306/demoproduct?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Avoid startup failure if JDBC metadata can't be read (still requires DB running)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect